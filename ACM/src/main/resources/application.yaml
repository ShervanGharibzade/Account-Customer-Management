security:
  jwt:
    secret: "CHANGE_THIS_TO_A_LONG_256_BIT_SECRET_KEY_FOR_HS256"
    expiration: 3600000

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/core_banking
    username: core_user
    password: core_password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080